# Starship config вҖ” clean two-line prompt with right-side context

format = "$username$hostname$os$directory$git_branch$git_status$line_break$character"
right_format = "$python$nodejs$rust$golang$java$docker_context$cmd_duration"

# в”Җв”Җ OS icon в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
style = "bold #8be9fd"

[os.symbols]
Macos = "п…№ "

# в”Җв”Җ SSH awareness в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
show_always = false
style_user = "dimmed white"
format = "[$user]($style)@"

[hostname]
ssh_only = true
style = "dimmed white"
format = "[$hostname]($style) "

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
truncation_length = 4
truncation_symbol = "вҖҰ/"
style = "bold #8be9fd"
read_only = "у°Ңҫ"
home_symbol = "~"
repo_root_style = "bold #f1fa8c"
before_repo_root_style = "dimmed white"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
format = "[$path]($style)[$read_only]($read_only_style) "
truncate_to_repo = true

# в”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = ""
style = "bold #bd93f9"
format = '[(\($branch(:$remote_branch)\))]($style) '

[git_status]
ahead = "[вҮЎ${count}](bold green)"
behind = "[вҮЈ${count}](bold red)"
diverged = "[вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}](bold yellow)"
conflicted = "[=${count}](bold red)"
untracked = "[?${count}](bold blue)"
stashed = "[*${count}](dimmed white)"
modified = "[!${count}](bold yellow)"
staged = "[+${count}](bold green)"
renamed = "[В»${count}](bold magenta)"
deleted = "[вңҳ${count}](bold red)"
format = '($all_status$ahead_behind )'

# в”Җв”Җ Languages (only show when relevant) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[python]
symbol = "оҳҶ "
style = "bold #3776ab"
format = '[$symbol($virtualenv)]($style) '

[nodejs]
symbol = "оңҳ "
style = "bold #68a063"
format = '[$symbol]($style) '

[rust]
symbol = "оһЁ "
style = "bold #f74c00"
format = '[$symbol]($style) '

[golang]
symbol = "оҳ§ "
style = "bold #00add8"
format = '[$symbol]($style) '

[java]
symbol = "оү– "
style = "bold #f89820"
format = '[$symbol]($style) '

[docker_context]
symbol = "пҢҲ "
style = "bold #2496ed"
format = '[$symbol$context]($style) '

[gcloud]
disabled = true

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
style = "bold #ffb86c"

[time]
disabled = true

# в”Җв”Җ Prompt character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вҶ’](bold green)"
error_symbol = "[вҶ’](bold red)"
vimcmd_symbol = "[вҶҗ](bold green)"
